<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChillyAnime - главная</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Стилизуем скроллбары под современный дизайн */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #020617;
        }

        /* slate-950 */
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6366f1;
        }

        /* indigo-500 */

        /* Скрываем скроллбар для каруселей, но оставляем возможность скроллить */
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }

        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-300 font-sans antialiased selection:bg-indigo-500 selection:text-white">

    <header
        class="fixed w-full top-0 z-50 bg-slate-950/70 backdrop-blur-md border-b border-white/5 transition-all duration-300">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <a href="/"
                class="text-3xl font-extrabold tracking-tighter bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 text-transparent bg-clip-text hover:opacity-80 transition">
                ChillyAnime
            </a>

            <form action="/search" method="get" class="w-full md:w-1/3 relative group">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400 group-focus-within:text-indigo-400 transition" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input type="text" name="q" placeholder="Найти аниме..." required
                    class="w-full bg-slate-900 text-slate-100 rounded-full pl-10 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 border border-slate-700 focus:border-indigo-500 transition-all shadow-inner">
            </form>
        </div>
    </header>

    <main class="container mx-auto px-4 pt-28 pb-12 space-y-16">

        <section class="relative group">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
                    <span class="w-2 h-8 bg-pink-500 rounded-full"></span>
                    Свежие эпизоды
                </h2>
            </div>

            <button onclick="scrollSlider(this, -1)"
                class="absolute left-0 top-[55%] -translate-y-1/2 z-20 bg-slate-900/90 text-white p-3 md:p-4 rounded-r-2xl opacity-0 group-hover:opacity-100 transition-all hover:bg-pink-600 shadow-2xl hidden md:block border border-white/10 border-l-0">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>

            <div class="scroll-container flex overflow-x-auto hide-scroll snap-x snap-mandatory gap-6 pb-6 pt-2">
                {% for anime in new_animes %}
                <a href="/anime/{{ anime.id }}"
                    class="snap-start group/card relative flex-shrink-0 w-[calc(50%_-_0.75rem)] sm:w-[calc(33.333%_-_1rem)] md:w-[calc(25%_-_1.125rem)] lg:w-[calc(20%_-_1.2rem)] xl:w-[calc(16.666%_-_1.25rem)] rounded-2xl overflow-hidden shadow-lg shadow-black/50 hover:shadow-indigo-500/20 hover:-translate-y-2 transition-all duration-300 bg-slate-800">
                    <div class="relative w-full aspect-[2/3] overflow-hidden">
                        <img src="{{ anime.poster_url }}" alt="{{ anime.title }}"
                            class="w-full h-full object-cover group-hover/card:scale-110 transition-transform duration-700 ease-in-out">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/40 to-transparent opacity-80 group-hover/card:opacity-90 transition-opacity">
                        </div>
                    </div>

                    <div
                        class="absolute top-3 right-3 bg-slate-900/80 backdrop-blur-sm text-yellow-400 text-xs font-bold px-2.5 py-1 rounded-md border border-white/10 shadow-lg flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                            <path
                                d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z">
                            </path>
                        </svg>
                        {{ anime.rating_shikimori }}
                    </div>

                    <div
                        class="absolute bottom-0 w-full p-4 transform translate-y-2 group-hover/card:translate-y-0 transition-transform duration-300">
                        <h3 class="text-sm md:text-base font-bold text-white line-clamp-2 leading-tight drop-shadow-md">
                            {{ anime.title }}</h3>
                        <div class="text-xs text-slate-400 mt-1 font-medium">{{ anime.year }}</div>
                    </div>
                </a>
                {% endfor %}
            </div>

            <button onclick="scrollSlider(this, 1)"
                class="absolute right-0 top-[55%] -translate-y-1/2 z-20 bg-slate-900/90 text-white p-3 md:p-4 rounded-l-2xl opacity-0 group-hover:opacity-100 transition-all hover:bg-pink-600 shadow-2xl hidden md:block border border-white/10 border-r-0">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </section>

        <section class="relative group">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
                    <span class="w-2 h-8 bg-indigo-500 rounded-full"></span>
                    Топ по рейтингу
                </h2>
            </div>

            <button onclick="scrollSlider(this, -1)"
                class="absolute left-0 top-[55%] -translate-y-1/2 z-20 bg-slate-900/90 text-white p-3 md:p-4 rounded-r-2xl opacity-0 group-hover:opacity-100 transition-all hover:bg-indigo-600 shadow-2xl hidden md:block border border-white/10 border-l-0">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>

            <div class="scroll-container flex overflow-x-auto hide-scroll snap-x snap-mandatory gap-6 pb-6 pt-2">
                {% for anime in popular_animes %}
                <a href="/anime/{{ anime.id }}"
                    class="snap-start group/card relative flex-shrink-0 w-[calc(50%_-_0.75rem)] sm:w-[calc(33.333%_-_1rem)] md:w-[calc(25%_-_1.125rem)] lg:w-[calc(20%_-_1.2rem)] xl:w-[calc(16.666%_-_1.25rem)] rounded-2xl overflow-hidden shadow-lg shadow-black/50 hover:shadow-indigo-500/20 hover:-translate-y-2 transition-all duration-300 bg-slate-800">
                    <div class="relative w-full aspect-[2/3] overflow-hidden">
                        <img src="{{ anime.poster_url }}" alt="{{ anime.title }}"
                            class="w-full h-full object-cover group-hover/card:scale-110 transition-transform duration-700 ease-in-out">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/40 to-transparent opacity-80 group-hover/card:opacity-90 transition-opacity">
                        </div>
                    </div>
                    <div
                        class="absolute top-3 right-3 bg-slate-900/80 backdrop-blur-sm text-yellow-400 text-xs font-bold px-2.5 py-1 rounded-md border border-white/10 shadow-lg flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                            <path
                                d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z">
                            </path>
                        </svg>
                        {{ anime.rating_shikimori }}
                    </div>
                    <div
                        class="absolute bottom-0 w-full p-4 transform translate-y-2 group-hover/card:translate-y-0 transition-transform duration-300">
                        <h3 class="text-sm md:text-base font-bold text-white line-clamp-2 leading-tight drop-shadow-md">
                            {{ anime.title }}</h3>
                        <div class="text-xs text-slate-400 mt-1 font-medium">{{ anime.year }}</div>
                    </div>
                </a>
                {% endfor %}
            </div>

            <button onclick="scrollSlider(this, 1)"
                class="absolute right-0 top-[55%] -translate-y-1/2 z-20 bg-slate-900/90 text-white p-3 md:p-4 rounded-l-2xl opacity-0 group-hover:opacity-100 transition-all hover:bg-indigo-600 shadow-2xl hidden md:block border border-white/10 border-r-0">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </section>
    </main>
    <script>
        function scrollSlider(button, direction) {
            const container = button.parentElement.querySelector('.scroll-container');
            // Теперь мы прокручиваем ровно на видимую ширину самого контейнера!
            // Это значит, что прокрутится ровно один блок карточек без сдвигов.
            const scrollAmount = container.clientWidth * direction;

            container.scrollBy({
                left: scrollAmount,
                behavior: 'smooth'
            });
        }
    </script>
</body>

</html>
